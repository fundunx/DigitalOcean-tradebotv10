<!doctype html><html><head><meta charset="utf-8"><title>ApexQuant Live Paper Dashboard</title>
<style>
body{margin:0;background:#08111f;color:#e7eefb;font:15px Arial;padding:20px}h1{margin:0;color:#7dd3fc}.sub{color:#93a4bb}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}.card,table{background:#101c2d;border:1px solid #263956;border-radius:12px}.card{padding:14px}.label{color:#93a4bb;font-size:12px}.value{font-size:24px;font-weight:bold;margin-top:6px}.up{color:#4ade80}.down{color:#fb7185}table{border-collapse:collapse;width:100%;overflow:hidden}th,td{padding:11px;text-align:left;border-bottom:1px solid #263956}th{color:#93c5fd}.wrap{overflow:auto}.small{color:#93a4bb;font-size:12px}
</style></head><body>
<h1>ApexQuant V10</h1><p class="sub">Live paper trading monitor · auto-refreshes every 5 seconds · live trading locked</p>
<div class="grid" id="cards"></div><h2>Open paper trades</h2><div class="wrap" id="trades">Loading…</div>
<script>
const money=n=>`${n<0?'-':''}£${Math.abs(Number(n||0)).toFixed(2)}`;
function card(label,value,cls=''){return `<div class="card"><div class="label">${label}</div><div class="value ${cls}">${value}</div></div>`}
async function load(){
 const d=await (await fetch('/api/state')).json(), p=Object.fromEntries((d.markets||[]).map(m=>[m.symbol,m.price])), t=d.openTrades||[];
 const open=t.reduce((s,x)=>s+Number(x.sizeGbp||0)*((Number(p[x.symbol])-Number(x.entryPrice))/Number(x.entryPrice))*(x.side==='short'?-1:1),0);
 const total=Number(d.portfolio?.cashGbp||0)+open-20000, cls=n=>n>=0?'up':'down';
 document.querySelector('#cards').innerHTML=[
 card('Mode',`${d.mode||'unknown'} / ${d.liveTradingLocked?'LOCKED':'UNSAFE'}`,d.liveTradingLocked?'up':'down'),
 card('Markets watched',d.markets?.length||0),
 card('Open positions',t.length),
 card('Open exposure',money(t.reduce((s,x)=>s+Number(x.sizeGbp||0),0))),
 card('Unrealised P&L',money(open),cls(open)),
 card('Total P&L after paid fees',money(total),cls(total)),
 card('Realised P&L',money(d.portfolio?.realizedPnlGbp),cls(d.portfolio?.realizedPnlGbp)),
 card('Fees paid',money(d.portfolio?.feesPaidGbp))
 ].join('');
 document.querySelector('#trades').innerHTML=t.length?`<table><tr><th>Market</th><th>Side</th><th>Size</th><th>Entry</th><th>Now</th><th>Live P&L</th><th>Reason</th></tr>${t.map(x=>{const q=p[x.symbol],v=Number(x.sizeGbp)*((q-x.entryPrice)/x.entryPrice)*(x.side==='short'?-1:1);return `<tr><td>${x.symbol.toUpperCase()}</td><td>${x.side.toUpperCase()}</td><td>${money(x.sizeGbp)}</td><td>${x.entryPrice}</td><td>${q||'—'}</td><td class="${cls(v)}">${money(v)}</td><td class="small">${x.entryReason||'—'}</td></tr>`}).join('')}</table>`:'<p class="small">No open positions.</p>';
}
load();setInterval(load,5000);
</script></body></html>
